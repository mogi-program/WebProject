<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .font_big {
            font-size: 2em;
        }

        .font_style {
            font-style: italic;
            font-weight: bold;
            text-align: center; /*텍스트를 좌우기준 가운데 정렬*/
        }

        .button {
            width: 150px;
            height: 70px;
            background-color: #ff6a00;
            border-width: 10px;
            border-style: solid;
            border-color: #ffffff;
            border-radius: 30px;
            box-shadow: 5px 5px 5px #a9a9a9;
        }

        .button > a {
            display: block;
            width: 100%;
            height: 100%;
            line-height: 70px; /*div의 높이만큼 하면 수직 정렬이 됨*/
            color: #ffffff;
            text-decoration: none; /*a태그의 밑줄 제거*/
        }
    </style>
</head>

<body>
    <div class="button">
        <a class="font_big font_style" href="https://www.naver.com">네이버</a>
    </div>
</body>

</html>
