<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            position: absolute;
            /*position이 absolute인 요소는 부모 요소를 기준으로 위치가 결정됨*/
        }

        .box:nth-child(1) {
            background-color: #ff0000;
            left: 10px;
            top: 10px;
            z-index: 100;
        }

        .box:nth-child(2) {
            background-color: #00ff00;
            left: 50px;
            top: 50px;
            z-index: 50;
        }

        .box:nth-child(3) {
            background-color: #0000ff;
            left: 90px;
            top: 90px;
            z-index: 0;
        }
        body > div{
            width: 500px;
            height: 100px;
            border-width: 10px;
            border-style: solid;
            position: relative; /*position이 relative인 요소는 자식 요소의 위치를 기준으로 함*/
            overflow: scroll; /*overflow가 scroll인 요소는 자식 요소가 부모 요소보다 클 때 스크롤이 생김*/
        }
    </style>
</head>

<body>
    <h1>Box의 위쪽에 있는 h1</h1>
    <div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
