<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 만들기</title>
</head>
<body>
    <h3>순서가 없는 목록</h3>
    <ul type="circle">  <!-- disc(deafault), circle, square -->
        <li>복숭아</li>
        <li>바나나</li>
        <li>오렌지</li>
    </ul>
    <h3>순서가 있는 목록</h3>
    <ol type="1">  <!-- 1, a, A, i, I -->
        <li>복숭아</li>
        <li>바나나</li>
        <li>오렌지</li>
    </ol>    
</body>
</html>
