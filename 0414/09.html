<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            width: 300px;
            height: 300px;
            background-color: blue;
            color: white;
            border: 10px double red;
            margin: 0 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
        .div2{
            width: 400px;
            height: 400px;
            background-color: green;
            color: white;
            border: 20px ridge yellow;
            margin: 0 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
        .div3{
            width: 500px;
            height: 500px;
            background-color: orange;
            color: white;
            border: 20px groove black;
            margin: 0 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
    </style>
</head>
<body>
    <div class="div1">박스 속성과 값을 설정 방법</div>
    <div class="div2">박스 속성과 값을 설정 방법</div>
    <div class="div3">박스 속성과 값을 설정 방법</div>
</body>
</html>
