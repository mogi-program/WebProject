<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상태선택자</title>
    <style>
        /* 상태선택자 */
        input:enabled {
            background-color: lightgreen;
        }
        input:disabled {
            background-color: lightcoral;
        }
        input:focus {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type="text"><br><br>
    <h1>사용 불가능한 상태</h1>
    <input type="text" disabled><br><br>

</body>
</html>
