<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- jQuery Library 설정 -->
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <!-- jQuery 문법으로 코드 작성 -->
    <script>
        $(document).ready(function(){
            $("#h").css("color", "magenta")
            $("#h").css("background", "black")
            $(".h2").css("color", "white")
            $(".h2").css("background", "magenta")
        });
    </script>
</head>
<body>
    <h1>jQuery 라이브러리 설정 및 문법</h1>
    <h1 id="h">jQuery 라이브러리 설정 및 문법</h1>
    <h1 class="h2">jQuery 라이브러리 설정 및 문법</h1>
</body>
</html>
