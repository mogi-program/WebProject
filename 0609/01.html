<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = function(){
            setInterval(function imgChange(){
            img = document.getElementById('im');
            if(count == 1){
                img.src = "imgs/idol2.png";
                count += 1;
            }
            else if(count == 2){
                img.src = "imgs/idol3.png";
                count += 1;
            }
            else if(count == 3){
                img.src = "imgs/idol4.png";
                count += 1;
            }
            else if(count == 4){
                img.src = "imgs/idol5.png";
                count += 1;
            }
            else if(count == 5){
                img.src = "imgs/idol1.png";
                count = 1;
            }
            
        }, 1000)
        }
        function greet(){
            alert("안녕하세요 인라인 이벤트 모델")
        }
        function addStr(btn){
            btn.textContent += '*'
        }
        function overChange(btn){
            btn.style.backgroundColor = 'red'
        }
        function outChange(btn){
            btn.style.backgroundColor = 'blue'
        }
        let count = 1;
        let count2 = 1;
        function imgChange2(img){
            if(count2 == 1){
                img.src = "imgs/idol2.png";
                count2 += 1;
            }
            else if(count2 == 2){
                img.src = "imgs/idol3.png";
                count2 += 1;
            }
            else if(count2 == 3){
                img.src = "imgs/idol4.png";
                count2 += 1;
            }
            else if(count2 == 4){
                img.src = "imgs/idol5.png";
                count2 += 1;
            }
            else if(count2 == 5){
                img.src = "imgs/idol1.png";
                count2 = 1;
            }
        }
    </script>
</head>
<body>
    <button onclick="alert('인라인 이벤트 모델 1')">인라인 이벤트 모델 1</button>
    <br><br>
    <button onclick="greet()">인라인 이벤트 모델 2</button>
    <br><br>
    <button onclick="addStr(this)">별 추가</button>
    <br><br>
    <button onmouseover="overChange(this)" onmouseout="outChange(this)">배경 및 글자색 변경</button>
    <br><br>
    <img id="im" src="imgs/idol1.png" width="400" height="300">
    <img src="imgs/idol1.png" width="400" height="300" onclick="imgChange2(this)">
</body>
</html>
