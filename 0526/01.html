<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let func = function(a) {
            alert(`${a}입니다.`);
        }
        let anmFunc2 = (a) => {
            alert(`${a}입니다.`);
        }

        func("익명 함수");
        anmFunc2("화살표 함수");

    </script>
</body>
</html>
