<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제곱승 계산 함수</title>
</head>
<body>
    <script>
        function tenTimes(callback, times) {
            for (let i = 0; i < times; i++) {
                callback();
            }
        }
        function hello(message) {
            alert(message);
        }

    </script>
    <form>
        <input type="text" id="base" placeholder="할 말 입력하기">
        <input type="number" id="exponent" placeholder="횟수 입력하기">
        <button type="button" onclick="tenTimes(() => hello(document.getElementById('base').value), Number(document.getElementById('exponent').value))">실행하기</button>
    </form>
</body>
</html>
