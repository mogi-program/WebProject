<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
    <script>
        let domElementColor = () => document.querySelector("#dom").style.backgroundColor = "yellow";
    </script>
</head>
<body>
    <h1 id="dom">DOM(Document Object Model)</h1>
    <button onclick="domElementColor()">색 변경하기</button>
</body>
</html>
