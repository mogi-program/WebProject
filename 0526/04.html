<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제곱승 계산 함수</title>
</head>
<body>
    <script>
        function pow(base, exponent) {
            return base ** exponent;
        }

    </script>
    <form>
        <input type="number" id="base" placeholder="밑 입력">
        <input type="number" id="exponent" placeholder="지수 입력">
        <button type="button" onclick="alert(pow(Number(document.getElementById('base').value), Number(document.getElementById('exponent').value)))">계산하기</button>
    </form>
</body>
</html>
