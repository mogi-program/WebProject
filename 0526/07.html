<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let product = {
            name: "맥북 에어",
            price: 10000000,
            product: "애플",
            printInfo: () => {
                alert(`제품명 : ${this.name}\n가격 : ${this.price}\n제조사 : ${this.product}`);
            }
        };

        for(let key in product) {
            alert(`${key} : ${product[key]}`);  
        }
    </script>
</body>
</html>
