<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display 속성</title>
    <style>
        #box{
            display: inline-block; /* inline 일때는 너비와 높이 적용이 안되지만 inline-block 일때는 너비와 높이 적용이 된다. */
            width: 150px;
            height: 50px;
            background-color: skyblue;
            margin: 10px;
        }
    </style>
</head>
<body>
    <p>display 속성의 값 중에서 inline과 inline-block의 차이점 비교</p>
    <span>inline 요소</span>
    <div id="box">차이점 비교 대상</div>
    <span>inline 요소</span>
    <p>display 속성의 값 중에서 inline과 inline-block의 차이점 비교</p>
</body>
</html>
