<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function hello(name){
            alert("Hello " + name);
        }
    </script>
    <form>
        <input type="text" id="nameInput">
        <button type="button" onclick="hello(document.getElementById('nameInput').value)">Say Hello</button>
    </form>
</body>
</html>
