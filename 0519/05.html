<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let date = new Date();
        let year = date.getFullYear();
        let month = date.getMonth() + 1; <!-- 0부터 시작하기 때문에 +1을 해준다. -->
        let day = date.getDate();
        let hours = date.getHours();
        let minutes = date.getMinutes();
        let seconds = date.getSeconds();

        let meridiem;

        if(hours < 12){
            meridiem = "오전";
        } else {
            meridiem = "오후";
        }
        alert(year + "년 " + month + "월 " + day + "일 " + meridiem + " " + hours + "시" + minutes + "분" + seconds + "초");
    </script>
</body>
</html>

</body>
</html>
