<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let date = new Date();
        let hours = date.getHours();
        
        if(hours < 5){
            alert("새벽입니다. 좀 더 주무세요")
        }
        else if(hours < 7){
            alert("아침입니다. 출근준비 하세요.")
        }
        else if(hours < 9){
            alert("회사에 출근 중입니다.")
        }
        else if(hours < 12){
            alert("여심히 회사 업무를 처리하세요.")
        }
        else if(hours < 13){
            alert("점심시간입니다. 맛있게 드세요.")
        }
        else if(hours < 18){
            alert("오후입니다. 힘내세요.")
        }
        else if(hours < 19){
            alert("저녁입니다. 퇴근 준비하세요.")
        }
    </script>
</body>
</html>
