<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID 선택자 연습</title>
    <style>
        #header{
            width: 800px;
            margin: 0 auto;
            background-color: lightpink;
        }
        #wrap{
            width: 800px;
            margin: 0 auto;
            overflow: hidden;
            background-color: lightyellow;
        }
        #aside{
            background-color: lightblue;
            width: 200px;
            float: left;
        }
        #content{
            background-color: lightgray;
            width: 400px;
            float: right;
        }

    </style>
</head>
<body>
    <div id="header">
        <h1>한국폴리텍대학</h1>
    </div>
    <div id="wrap">
        <div id="aside">
            <h1>인공지능소프트웨어</h1>
        </div>
        <div id="content">
            <h1>웹프로그래밍기초</h1>
            <p>ID 선택자 연습을 위한 문단입니다.</p>
        </div>
    </div>
</body>
</html>
