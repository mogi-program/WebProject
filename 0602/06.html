<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function callAlert(msg){
            alert(msg)
        }
    </script>
</head>
<body>
    <input type="text" id="t">
    <button onclick="callAlert(document.getElementById('t').value)">출력</button>
</body>
</html>
